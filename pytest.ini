[pytest]
# NOTE: tests/test_*.py (test_rife.py, test_service.py, test_inference.py,
# test_tensor.py, test_config.py, test_loader.py) are pre-existing manual
# smoke scripts that require the external Practical-RIFE repo + real demo
# images and print output rather than asserting -- they are not pytest
# tests and are run manually on a machine with Practical-RIFE set up.
# `pytest` here targets the SEVIR suite, which is fully self-contained
# (synthetic fixtures, no external deps).
testpaths = tests/sevir
python_files = test_*.py
addopts = -ra
